name: Only Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: only-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      web-changed: ${{ steps.changes.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: main
          filters: |
            web:
              - '!**/.github/workflows/**'
              - '!docs/**'
              - '!README*'
              - '!.gitignore'
              - '!.claude/**'
              - '!LICENSE*'
              - '**'
            workflow:
              - '.github/workflows/only-build.yaml'

  web-build:
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No Web changes detected
        if: needs.check-changes.outputs.web-changed != 'true'
        run: |
          echo "🎯 No Web changes detected in functional scope"
          echo "📁 Scope checked: repo root excluding docs/ README* .gitignore .claude/** LICENSE* .github/workflows/**"
          echo "✅ No build required, task completed"

      - name: Set up Docker Buildx
        if: needs.check-changes.outputs.web-changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Web Docker image
        if: needs.check-changes.outputs.web-changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          file: Dockerfile
          tags: web:local
          platforms: linux/amd64

      - name: Web build completed
        if: needs.check-changes.outputs.web-changed == 'true'
        run: |
          echo "🚀 Web Docker image build completed"
          echo "📦 Image tag: web:local"
