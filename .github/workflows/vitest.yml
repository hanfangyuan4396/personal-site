name: vitest

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: vitest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    name: Determine changed scopes
    runs-on: ubuntu-latest
    outputs:
      web-changed: ${{ steps.changes.outputs.web }}
      workflow-changed: ${{ steps.changes.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: main
          filters: |
            web:
              - '!**/.github/workflows/**'
              - '!docs/**'
              - '!README*'
              - '!.gitignore'
              - '!.claude/**'
              - '!LICENSE*'
              - '**'
            workflow:
              - '.github/workflows/vitest.yml'

  test:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.web-changed == 'true' || needs.check-changes.outputs.workflow-changed == 'true'
    timeout-minutes: 15
    env:
      NODE_ENV: test
      DATABASE_URL: file:./test.db
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Run Vitest (with coverage)
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=json-summary

      - name: Publish coverage to job summary
        if: always()
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          
          const summaryPath = path.join(process.cwd(), "coverage", "coverage-summary.json");
          const out = process.env.GITHUB_STEP_SUMMARY;
          
          if (!out) {
            console.log("GITHUB_STEP_SUMMARY is not set, skip.");
            process.exit(0);
          }
          
          if (!fs.existsSync(summaryPath)) {
            fs.appendFileSync(out, `## 测试覆盖率（Vitest）\n\n未找到 coverage 汇总文件：\`${summaryPath}\`\n`);
            process.exit(0);
          }
          
          const json = JSON.parse(fs.readFileSync(summaryPath, "utf-8"));
          const total = json.total || {};
          const rows = [
            ["Statements", total.statements],
            ["Branches", total.branches],
            ["Functions", total.functions],
            ["Lines", total.lines],
          ].map(([name, v]) => {
            const pct = v?.pct ?? 0;
            const covered = v?.covered ?? 0;
            const totalN = v?.total ?? 0;
            return `| ${name} | ${pct}% | ${covered}/${totalN} |`;
          });
          
          const md = [
            "## 测试覆盖率（Vitest）",
            "",
            "| Metric | % | Covered/Total |",
            "| --- | ---: | ---: |",
            ...rows,
            "",
          ].join("\n");
          
          fs.appendFileSync(out, md);
          NODE
